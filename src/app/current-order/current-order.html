<table border="1">

<tr>
<th>Name</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Action</th>
</tr>

<tr *ngFor="let item of cart">

<td>{{item.name}}</td>

<td>{{item.price}}</td>

<td>
<input type="number"
[value]="item.qty"
(change)="changeQty(item,$event)">
</td>

<td>{{item.price*item.qty}}</td>

<td>
<button (click)="remove(item)">Remove</button>
</td>

</tr>

</table>

<h3>Total: {{getTotal()}} VND</h3>

<button (click)="checkout()">PAY</button>
